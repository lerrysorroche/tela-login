name: Pipeline CI/CD Completo com Docker

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: node:20

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: npm install

      - name: Executar o Build (Vite)
        run: npm run build

      - name: Salvar pasta de Build como Artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v4

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
